name: Test Project
on: push
jobs:
 test:
   runs-on: ubuntu-latest
   steps:
     - name: get code
       uses: actions/checkout@v6
     - name: Set up Node
       uses: actions/setup-node@v6.3.0
       with:
         node-version: 24
     - name: Install dependency
       run: npm ci
     - name: Run tests1
       run: npm test
       
         
            


